apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-native-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AmazingYe-oss/cloud-native-shop-gitops.git
    targetRevision: main
    path: charts/cloud-native-shop
    helm:
      valueFiles:
        - ../../environments/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloud-native-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
