{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
      - name: {{ $name }}
        image: {{ $.Values.registry }}/{{ $svc.image }}:{{ $svc.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ $svc.port }}
        {{- if $svc.env }}
        env:
        {{- range $key, $val := $svc.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
        {{- end }}
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: {{ $svc.healthPath }}
            port: {{ $svc.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: {{ $svc.healthPath }}
            port: {{ $svc.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
---
{{- end }}
