{{- range $name, $svc := .Values.services }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}
spec:
  type: {{ $svc.serviceType }}
  selector:
    app: {{ $name }}
  ports:
  - name: http
    port: {{ $svc.port }}
    targetPort: {{ $svc.port }}
    {{- if $svc.nodePort }}
    nodePort: {{ $svc.nodePort }}
    {{- end }}
---
{{- end }}
